<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OurFanfics – Читай и создавай</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/settings.css">
    <link rel="stylesheet" href="/css/asss.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="image-header">
            <img src="/images/11.png" alt="Лого">
        </div>
        <div class="header-title">
            <h1>OurFanfics</h1>
            <p>The creativity of fans prolongs the life of the characters</p>
        </div>
        <div class="LoginButton">
            <button>Log In</button>
        </div>
    </div>
    <div class="main">
        <div class="nav-panel">
            <div class="profile-vision">
                <img src="/images/anonymous-profile.png" class="profile-icon" alt="avatar">
                <div class="nick" data-i18n="profile-nick">Nick</div>
            </div>
            <div class="buttons">
                <button data-page="main" data-i18n="nav-main" id="navMainBtn">Main</button>
                <button data-page="profile" data-i18n="nav-profile">Profile</button>
                <button data-page="create" data-i18n="nav-create">Create</button>
                <button data-page="saves" data-i18n="nav-saves">Saves</button>
                <button data-page="settings" data-i18n="nav-settings">Settings</button>
                <button data-page="rules" data-i18n="nav-rules">Rules</button>
                <button data-page="faq" data-i18n="nav-faq">FAQ</button>
                <button data-page="back" data-i18n="nav-back" id="navBackBtn">← Back</button>
            </div>
        </div>
        <div class="main-panel" id="dynamicContent">
            <div id="loadingIndicator" style="text-align:center; padding:40px;">⏳ Загрузка...</div>
        </div>
    </div>
</div>

<script src="/js_outer/outer.js"></script>
</body>
</html>
    <script src="/js_outer/outer.js"></script>
    <script src="/js_inter/main.js"></script>
    <script src="/js_inter/settings.js"></script>
    <script src="/js_inter/asss.js"></script>
