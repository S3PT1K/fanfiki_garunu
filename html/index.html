                </div>
            </div>
            <div class="main-panel">
                <!-- Блок для отображения списка фанфиков -->

<script>
    // Функция для перехода на страницу фанфика
    function goToFanfic(fanficId, fanficTitle) {
        const encodedTitle = encodeURIComponent(fanficTitle);
        window.location.href = `asss.html?id=${fanficId}`;
    }

    // Функция загрузки и отображения фанфиков
    async function displayFanfics() {
        const container = document.getElementById('fanficsContainer');
        if (!container) return;
        
        try {
            if (typeof getFanfics !== 'function') {
                container.innerHTML = '<p>❌ Ошибка: функция getFanfics не загружена. Убедитесь, что подключен outer.js</p>';
                return;
            }
            
            const fanfics = await getFanfics();
            
            if (!fanfics || fanfics.length === 0) {
                container.innerHTML = '<p>😢 Пока нет фанфиков. Создай первый на странице "Create"!</p>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < fanfics.length; i++) {
                const f = fanfics[i];
                const fanficId = f.id || i;
                html += `
                    <div class="fanfic-item" style="border-bottom: 2px solid brown; padding: 15px 0; margin-bottom: 10px;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap;">
                            <div style="flex: 1;">
                                <h3 style="margin: 0 0 5px 0; color: #4a2a2a;">📌 ${escapeHtml(f.title)}</h3>
                                <p style="margin: 5px 0; color: #666;">
                                    ✍️ <strong>Автор:</strong> ${escapeHtml(f.author)} &nbsp;|&nbsp;
                                    🕒 ${escapeHtml(f.created_at) || 'дата неизвестна'}
                                </p>
                                <p style="margin-top: 10px; line-height: 1.4;">
                                    ${escapeHtml(f.content ? f.content.substring(0, 25) : '')}${f.content && f.content.length > 50 ? '...' : ''}
                                </p>
                            </div>
                            <div style="margin-left: 15px;">
                                <button onclick="goToFanfic(${fanficId}, '${escapeHtml(f.title).replace(/'/g, "\\'")}')" 
                                        style="padding: 8px 20px; background-color: #4a2a2a; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;">
                                    📖 Читать фанфик
                                </button>
                            </div>
                        </div>
                        ${f.content && f.content.length > 300 ? `<button onclick="alert('Полный текст фанфика:\n\n${escapeHtml(f.content)}')" style="margin-top: 8px; padding: 5px 12px; background-color: brown; color: white; border: none; border-radius: 3px; cursor: pointer;">📖 Быстрый просмотр</button>` : ''}
                    </div>
                `;
            }
            container.innerHTML = html;
            
        } catch (error) {
            console.error('Ошибка загрузки фанфиков:', error);
            container.innerHTML = '<p>❌ Не удалось загрузить фанфики. Проверь, запущен ли сервер (localhost:8080).</p>';
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        displayFanfics();
    });
</script>
                <div class="categories">
